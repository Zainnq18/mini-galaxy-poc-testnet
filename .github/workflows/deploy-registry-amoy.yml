name: Deploy Polygon Amoy Deployment Registry

on:
  workflow_dispatch:

jobs:
  deploy-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Deploy registry to Polygon Amoy
        env:
          NETWORK_NAME: Polygon Amoy
          CHAIN_ID: 80002
          CURRENCY_SYMBOL: POL
          BLOCK_EXPLORER_URL: https://amoy.polygonscan.com
          RPC_URL: ${{ secrets.POLYGON_AMOY_RPC_URL }}
          POLYGON_AMOY_RPC_URL: ${{ secrets.POLYGON_AMOY_RPC_URL }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: npm run deploy:registry:amoy
